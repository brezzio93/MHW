
<dx-tabs 
[dataSource]="moduleTabs" 
(onItemClick)="moduleGoTo($event.itemData.id)">
</dx-tabs>

@if(ds.campaignID == undefined) {
    <app-campaign></app-campaign>
}
@else {

    @if(inQuest) {
        <dx-tabs
            [items]="tab"
            (onItemClick)="goTo($event.itemData.id)" >
        </dx-tabs>
        <app-mission-log *ngIf="moduleIndex == 0"></app-mission-log>
        <app-mission *ngIf="moduleIndex != 0"></app-mission>
    }
    @if(!inQuest) {
        <dx-tabs style="margin-bottom: 2rem;"
            [items]="tabs"
            (onItemClick)="goTo($event.itemData.id)" >
        </dx-tabs>
        
        @if(!loading) {
            <app-inventory *ngIf="moduleIndex == 1" ></app-inventory>
            <app-armors *ngIf="moduleIndex == 2"></app-armors>
            <app-weapons *ngIf="moduleIndex == 3"></app-weapons>
        }
    } 
}
